<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"><rect width="390" height="844" fill="#F8F6F2"/><text x="40" y="86" font-size="30" font-weight="800" fill="#6B4F4F">文本转漫画</text><text x="42" y="120" font-size="14" fill="#B08A8F">把一段文字变成绘本分镜</text><rect x="40" y="158" width="310" height="250" rx="30" fill="#FFF9F4" stroke="#E9D7D2"/><text x="66" y="204" font-size="15" font-weight="800" fill="#6B4F4F">输入故事片段</text><text x="66" y="250" font-size="14" fill="#9B7A7A">例如：我们在傍晚一起散步，风很温柔。</text><rect x="40" y="438" width="310" height="96" rx="24" fill="#FFF0F2"/><text x="70" y="492" font-size="15" font-weight="800" fill="#6B4F4F">自动拆分为 3 页漫画</text><rect x="58" y="710" width="274" height="54" rx="27" fill="#F6BEC8"/><text x="150" y="744" font-size="16" font-weight="800" fill="#fff">生成漫画</text></svg>