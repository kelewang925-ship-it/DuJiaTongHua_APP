<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"><rect width="390" height="844" fill="#F8F6F2"/><text x="40" y="86" font-size="30" font-weight="800" fill="#6B4F4F">写一页童话</text><text x="42" y="120" font-size="14" fill="#B08A8F">把今天的小事悄悄收藏起来</text><rect x="40" y="158" width="310" height="92" rx="26" fill="#FFF9F4" stroke="#E9D7D2"/><text x="66" y="194" font-size="14" fill="#9B7A7A">今天的标题</text><text x="66" y="226" font-size="18" font-weight="800" fill="#6B4F4F">一起散步的傍晚</text><rect x="40" y="274" width="310" height="300" rx="28" fill="#FFF9F4" stroke="#E9D7D2"/><text x="66" y="316" font-size="15" font-weight="800" fill="#6B4F4F">正文</text><text x="66" y="360" font-size="14" fill="#9B7A7A">今天发生了什么值得被记住的小事？</text><rect x="40" y="596" width="310" height="78" rx="24" fill="#FFF0F2"/><text x="80" y="642" font-size="15" font-weight="800" fill="#6B4F4F">添加照片</text><rect x="58" y="720" width="274" height="54" rx="27" fill="#F6BEC8"/><text x="154" y="754" font-size="16" font-weight="800" fill="#fff">保存这一页</text></svg>