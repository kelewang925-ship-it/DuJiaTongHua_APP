<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"><rect width="390" height="844" fill="#F8F6F2"/><text x="40" y="86" font-size="28" font-weight="800" fill="#6B4F4F">动态详情</text><text x="42" y="120" font-size="14" fill="#B08A8F">一段被两个人共同收藏的故事</text><rect x="40" y="158" width="310" height="210" rx="30" fill="#FFF0F2" stroke="#E9D7D2"/><text x="150" y="276" font-size="42" fill="#F6BEC8">照片</text><rect x="40" y="398" width="310" height="150" rx="28" fill="#FFF9F4" stroke="#E9D7D2"/><text x="66" y="446" font-size="18" font-weight="800" fill="#6B4F4F">一起看了日落</text><text x="66" y="486" font-size="14" fill="#9B7A7A">风很轻，晚霞像糖果一样慢慢融化。</text><rect x="56" y="590" width="90" height="42" rx="21" fill="#FFF0F2"/><text x="82" y="617" font-size="13" fill="#B08A8F">喜欢 28</text><rect x="166" y="590" width="90" height="42" rx="21" fill="#FFF9F4" stroke="#E9D7D2"/><text x="196" y="617" font-size="13" fill="#6B4F4F">评论</text><rect x="40" y="680" width="310" height="54" rx="24" fill="#FFF9F4" stroke="#E9D7D2"/><text x="66" y="713" font-size="14" fill="#9B7A7A">写下你的回应...</text></svg>