<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"><rect width="390" height="844" fill="#F8F6F2"/><text x="40" y="86" font-size="30" font-weight="800" fill="#6B4F4F">评论</text><text x="42" y="120" font-size="14" fill="#B08A8F">两个人关于这段回忆的小回应</text><rect x="40" y="160" width="310" height="78" rx="24" fill="#FFF9F4" stroke="#E9D7D2"/><circle cx="76" cy="199" r="20" fill="#FFF0F2"/><text x="108" y="192" font-size="15" font-weight="800" fill="#6B4F4F">小童话</text><text x="108" y="216" font-size="13" fill="#9B7A7A">今天的晚霞真的好美。</text><rect x="40" y="260" width="310" height="78" rx="24" fill="#FFF9F4" stroke="#E9D7D2"/><circle cx="76" cy="299" r="20" fill="#FFF0F2"/><text x="108" y="292" font-size="15" font-weight="800" fill="#6B4F4F">王可乐</text><text x="108" y="316" font-size="13" fill="#9B7A7A">下次还一起去。</text><rect x="40" y="720" width="310" height="54" rx="24" fill="#FFF9F4" stroke="#E9D7D2"/><text x="66" y="753" font-size="14" fill="#9B7A7A">写下评论...</text></svg>