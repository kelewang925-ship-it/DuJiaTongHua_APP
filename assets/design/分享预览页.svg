<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"><rect width="390" height="844" fill="#F8F6F2"/><text x="40" y="86" font-size="30" font-weight="800" fill="#6B4F4F">分享预览</text><text x="42" y="120" font-size="14" fill="#B08A8F">把一页回忆温柔地分享出去</text><rect x="52" y="160" width="286" height="430" rx="34" fill="#FFF9F4" stroke="#E9D7D2"/><rect x="78" y="194" width="234" height="168" rx="28" fill="#FFF0F2"/><text x="155" y="290" font-size="40" fill="#F6BEC8">照片</text><text x="88" y="414" font-size="20" font-weight="800" fill="#6B4F4F">一起看了日落</text><text x="88" y="450" font-size="13" fill="#9B7A7A">今天的风很轻，晚霞也很温柔。</text><text x="88" y="506" font-size="12" fill="#B08A8F">来自《独家童话》</text><rect x="58" y="676" width="274" height="54" rx="27" fill="#F6BEC8"/><text x="158" y="710" font-size="16" font-weight="800" fill="#fff">分享给TA</text></svg>